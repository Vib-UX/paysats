# HTTP — Certbot will add SSL and a second server block for :443.
# Install: sudo cp deploy/nginx-api.paysats.exchange.conf /etc/nginx/sites-available/paysats-api
#          sudo ln -sf /etc/nginx/sites-available/paysats-api /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS:     sudo certbot --nginx -d api.paysats.exchange

server {
    listen 80;
    listen [::]:80;
    server_name api.paysats.exchange;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
